short_bio: >-
  <p>
    I am a doctoral candidate from <a href="https://www.psu.edu/" target="_blank">Penn State</a> working with <a href="https://www.eme.psu.edu/directory/randy-l-vander-wal" target="_blank">Prof. Randy Vander Wal.</a>
    My specialization is in sustainable carbon technologies, focusing on thermo-chemical upcycling of waste plastics to the critical mineral graphite. 
  </p>
  <p>
    Proficient in advanced material characterization techniques using High Resolution Transmission Electron Microscopy (HRTEM), X-ray diffraction (XRD), Selected Area Electron Diffraction (SAED), Scanning Electron Microscopy (SEM), Raman Spectroscopy, Thermogravimetric Analysis coupled with Fourier Transform Infrared Spectroscopy (TGA-FTIR), Gas Chromatography/Mass Spectrometry (GC-MS), Optical Microscopy, Curie-point micro pyrolyzer, Pyroprobe reactor, and Thermal Analysis (TGA/DSC). 
    My past projects include hands-on experience in biomass-to-biofuel conversion via pyrolysis and flash pyrolysis processes. 
    I am passionate about developing innovative solutions for circular economy and waste valorization, bridging the gap between laboratory research and industrial applications.
  </p>

